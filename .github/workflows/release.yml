name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.runner }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            deps: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libglfw3-dev
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            deps: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libglfw3-dev gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            deps: brew install glfw
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            deps: brew install glfw
          - runner: windows-latest
            goos: windows
            goarch: amd64
            deps: choco install mingw
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install system deps
        run: ${{ matrix.deps }}

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          EXE=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXE=".exe"; fi
          mkdir -p dist
          go build -ldflags="-s -w" \
            -o "dist/loom-mario-term_${{ matrix.goos }}_${{ matrix.goarch }}${EXE}" \
            ./examples/mario-term/
          go build -ldflags="-s -w" \
            -o "dist/loom-mario_${{ matrix.goos }}_${{ matrix.goarch }}${EXE}" \
            ./examples/mario/

      - name: Package
        shell: bash
        run: |
          cd dist
          for f in loom-mario-term_* loom-mario_*; do
            if [ -f "$f" ]; then
              base="${f%.exe}"
              tar czf "${base}.tar.gz" "$f"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    name: Publish release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect tarballs
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum *.tar.gz > checksums.txt

      - name: Build asset list
        id: assets
        run: |
          ASSETS=$(ls release-assets/*.tar.gz 2>/dev/null | xargs -n1 basename | sort)
          TABLE=""
          while IFS= read -r f; do
            TABLE="${TABLE}| \`${f}\` | \`${f}\` |"$'\n'
          done <<< "$ASSETS"
          echo "table<<EOF" >> $GITHUB_OUTPUT
          echo "${TABLE}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Loom Mario Demo

            **Version:** ${{ github.ref_name }}

            ### Quick install

            **Unix** (Linux, macOS, WSL):
            ```
            curl -sS https://raw.githubusercontent.com/ujjwalvivek/loom/main/examples/scripts/install.sh | sh
            ```

            **Windows** (PowerShell):
            ```powershell
            irm https://raw.githubusercontent.com/ujjwalvivek/loom/main/examples/scripts/install.ps1 | iex
            ```

            ### Artifacts

            | Binary | File |
            |--------|------|
            ${{ steps.assets.outputs.table }}

            **Checksums:** `checksums.txt`
          files: release-assets/*
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
